<!DOCTYPE html>
<html>
<head>
    <title>Task Manager Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #218838; }
        .task-card { background: #f9f9f9; padding: 15px; margin-top: 15px; border-left: 5px solid #007bff; border-radius: 4px; }
        .task-title { font-weight: bold; font-size: 18px; color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Add a New Task</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Task Title (e.g., Practice Arrays)" required>
            <textarea name="description" placeholder="Task Description..."></textarea>
            <button type="submit">➕ Add Task Securely</button>
        </form>

        <h2>📋 Current Live Tasks</h2>
        {% for task in tasks %}
            <div class="task-card">
                <div class="task-title">{{ task.title }}</div>
                <p>{{ task.description }}</p>
                <small style="color: #666;">Created on: {{ task.created_at }}</small>
            </div>
        {% empty %}
            <p>No tasks added yet. Use the button above to add one!</p>
        {% endfor %}
    </div>
</body>
</html>
